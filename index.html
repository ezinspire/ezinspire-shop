<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA COUTURE — Digital Flagship</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <canvas id="silk-canvas"></canvas>

    <header class="luxury-header">
        <div class="brand-logo">AURA COUTURE</div>
        
        <nav class="corner-menu" id="menu-trigger" aria-label="Open Menu">
            <span class="menu-label">EXPLORE</span>
            <div class="burger-icon">
                <span class="line"></span>
                <span class="line"></span>
            </div>
        </nav>
    </header>
       
    <div class="navigation-overlay" id="nav-overlay" aria-hidden="true">
        <div class="overlay-background"></div>
        <div class="menu-content">
            <ul class="menu-list">
                <li style="--item-index: 1;"><a href="#collections" class="menu-link"><span class="link-num">01</span> COLLECTIONS</a></li>
                <li style="--item-index: 2;"><a href="#runway" class="menu-link"><span class="link-num">02</span> THE RUNWAY</a></li>
                <li style="--item-index: 3;"><a href="#atelier" class="menu-link"><span class="link-num">03</span> THE ATELIER</a></li>
                <li style="--item-index: 4;"><a href="#stories" class="menu-link"><span class="link-num">04</span> EDITORIAL STORIES</a></li>
                <li style="--item-index: 5;"><a href="#boutiques" class="menu-link"><span class="link-num">05</span> DIGITAL FLAGSHIPS</a></li>
            </ul>
        </div>
    </div>

    <main class="hero-viewport">
       
        <div class="luxury-carousel" id="carousel">
            
            <div class="carousel-card active" data-index="0">
                <div class="image-wrapper">
                    <img src="silver-diamond-heels.jpg" alt="Couture Mini Dress">
                </div>
                <div class="card-meta">
                    <span class="collection-tag">COLLECTION N°01</span>
                    <h1 class="item-title">SILKEN MINI DRESS</h1>
                </div>
            </div>

            <!-- Card 02: Overlapping / Next State -->
            <div class="carousel-card next" data-index="1">
                <div class="image-wrapper">
                    <img src="hero-dress.jpg" alt="Asymmetrical Blazer">
                </div>
                <div class="card-meta">
                    <span class="collection-tag">COLLECTION N°01</span>
                    <h1 class="item-title">ASYMMETRIC COAT</h1>
                </div>
            </div>

        </div>
        
        <div class="carousel-controls">
            <button class="ctrl-btn" id="prev-btn">PREV</button>
            <span class="fraction-indicator" id="fraction">01 / 02</span>
            <button class="ctrl-btn" id="next-btn">NEXT</button>
        </div>
    </main>

    <script src="js/silk.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
